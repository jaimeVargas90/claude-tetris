<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contador</title>
<style>
  body { font-family: sans-serif; text-align: center; margin-top: 100px; background: #121212; color: #f5f5f5; }
  #valor { font-size: 4rem; margin: 20px; }
  button { font-size: 1.5rem; margin: 0 10px; padding: 10px 20px; cursor: pointer; background: #333; color: #f5f5f5; border: 1px solid #666; border-radius: 6px; }
  button:hover { background: #444; }
</style>
</head>
<body>
  <div id="valor">0</div>
  <button id="menos">-</button>
  <button id="reset">Reset</button>
  <button id="mas">+</button>

  <script>
    let contador = 0;
    const valor = document.getElementById('valor');
    document.getElementById('mas').onclick = () => valor.textContent = ++contador;
    document.getElementById('menos').onclick = () => valor.textContent = --contador;
    document.getElementById('reset').onclick = () => valor.textContent = contador = 0;
  </script>
</body>
</html>
