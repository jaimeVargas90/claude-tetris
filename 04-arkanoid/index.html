<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Arkanoid</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    canvas {
      background: #000;
      display: block;
    }
    .game-wrap {
      position: relative;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 600px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: monospace;
    }
    #overlay.visible {
      display: flex;
    }
    #overlay h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }
    #overlay button {
      font-size: 18px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="overlay">
      <h1 id="overlayMessage"></h1>
      <button id="restartButton">Reiniciar</button>
    </div>
  </div>
  <script src="assets/assets/spritesheet.js"></script>
  <script src="game.js"></script>
</body>
</html>
